<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self'; connect-src 'self'">
  <title>シナリオビューワー</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", monospace;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      color: #ffd700;
      margin-bottom: 1rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .stats {
      background: rgba(255, 255, 255, 0.1);
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 2rem;
      display: flex;
      gap: 2rem;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      color: #ffd700;
    }

    .stat-label {
      font-size: 0.8rem;
      color: #aaa;
    }

    .event-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .event-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1rem;
      transition: all 0.2s;
    }

    .event-card:hover {
      border-color: #ffd700;
    }

    .event-card.start {
      border-color: #4caf50;
      border-width: 2px;
    }

    .event-card.end {
      border-color: #f44336;
      border-width: 2px;
    }

    .event-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .event-id {
      font-weight: bold;
      color: #ffd700;
      font-size: 1.1rem;
    }

    .event-type {
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      background: #333;
    }

    .event-type.message {
      background: #2196f3;
    }

    .event-type.selection {
      background: #ff9800;
    }

    .event-content {
      margin: 0.5rem 0;
      padding: 0.5rem;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
      font-size: 0.9rem;
      max-height: 150px;
      overflow-y: auto;
    }

    .message-item {
      padding: 0.25rem 0;
      border-bottom: 1px solid #333;
    }

    .message-item:last-child {
      border-bottom: none;
    }

    .message-speaker {
      color: #ff69b4;
      font-weight: bold;
    }

    .message-text {
      color: #ccc;
    }

    .message-meta {
      font-size: 0.75rem;
      color: #666;
    }

    .choice-item {
      padding: 0.25rem 0.5rem;
      margin: 0.25rem 0;
      background: rgba(255, 152, 0, 0.2);
      border-radius: 4px;
    }

    .event-next {
      margin-top: 0.5rem;
      font-size: 0.85rem;
    }

    .next-label {
      color: #888;
    }

    .next-id {
      color: #4caf50;
      cursor: pointer;
    }

    .next-id:hover {
      text-decoration: underline;
    }

    .next-conditional {
      color: #ff9800;
      font-style: italic;
    }

    .flow-diagram {
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
    }

    .flow-diagram h2 {
      color: #ffd700;
      margin-bottom: 1rem;
    }

    .flow-text {
      font-family: monospace;
      white-space: pre;
      overflow-x: auto;
      line-height: 1.4;
    }

    .flow-node {
      color: #4caf50;
    }

    .flow-arrow {
      color: #888;
    }

    .flow-choice {
      color: #ff9800;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>シナリオビューワー</h1>
    <div class="stats" id="stats"></div>
    <div class="event-list" id="event-list"></div>
    <div class="flow-diagram">
      <h2>フロー図</h2>
      <div class="flow-text" id="flow-text"></div>
    </div>
  </div>

  <script type="module" src="viewer.js"></script>
</body>
</html>
